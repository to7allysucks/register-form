<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Register</title>
</head>
<body>
  <header class="header">
    <img src="logo.png" alt="icon" class="icon">
    <h1>Sign in to your Account</h1>
    <h4>Enter your email and password to log in </h4>
  </header>
  <div class="register-section">
    <button class="btn btn-google"><img src="google.png" alt="">Continue with Google</button>
    <span>Or login with</span>
    <form class="register">
      <input type="email" placeholder="Enter email" id="login" class="login">
      <input type="password" placeholder="Enter password" id="password">
      <div class="help-register">
        <div class="checkbox-section">
          <input type="checkbox" class="see-pass" name="check" id="check">
          <label for="check" >Показать пароль</label>
        </div>
        <a href="#" class='link'>Forgot Password ?</a>
      </div>
    </form>
    <button type="submit" class="btn btn-login">Log In</button>
    <div class="sign-up-section">
      <span>Don’t have an account?</span>
      <a href="#" class="link">Sign Up</a>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
