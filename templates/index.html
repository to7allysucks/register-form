<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <title>Register</title>
</head>
<body>
  <header class="header-section">
    <img src="../static/images/logo.png" alt="icon" class="icon">
    <h1 class="header__title">Sign in to your Account</h1>
    <h4 class="header__description">Enter your email and password to log in </h4>
  </header>
  <div class="register-section">
    <button class="btn btn-google"><img src="../static/images/google.png" alt="">Continue with Google</button>
    <span>Or login with</span>

    <form class="form-register" method="post" novalidate data-js-form>
      <div class="form-register">
        <input name="login"
               type="email"
               placeholder="Enter email"
               id="login"
               class="form-login"
               required
               minlength="5"
               maxlength="30"
               aria-errormessage="login-errors">
        <span class="field__error" id="login-errors" data-js-form-field-errors></span>
      </div>
      <div class="form-register">
        <input name="password"
               type="password"
               placeholder="Enter password"
               id="password"
               class="form-password"
               required
               minlength="8"
               maxlength="20"
               aria-errormessage="password-errors"
               data-js-form-password>
        <span class="field__error" id="password-errors" data-js-form-field-errors></span>
      </div>

      <div class="form-register__check-password">
        <div class="check-section">
          <input type="checkbox" class="check-password" name="check-password" id="check-password" data-js-form-check-password>
          <label for="check-password" >Показать пароль</label>
        </div>
        <a href="#" class='link'>Forgot Password ?</a>
      </div>
      <button type="submit" class="btn btn-login">Log In</button>
      <div class="sign-up-section">
        <span>Don’t have an account?</span>
        <a href="#" class="link">Sign Up</a>
      </div>
    </form>

  </div>
<script src="../static/script.js"></script>
</body>
</html>
